name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: yarn

      - name: Use Yarn 1.x (matches repo)
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version

      - name: Install deps
        run: yarn install --frozen-lockfile
        
      - name: Add qrcode (temp, no lockfile changes)
        run: yarn add -D qrcode --no-lockfile

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build
        
      - name: Generate QR PNG
        run: node scripts/gen-qr.mjs

      - name: Upload QR artifact
        uses: actions/upload-artifact@v4
        with:
          name: qr-images
          path: artifacts/*.png
